image: node:20

stages:
  - build
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - frontend/node_modules/
    - backend/node_modules/

backend-build:
  stage: build
  script:
    - cd backend
    - npm ci
    - npm run build
  only:
    - main

pages:
  stage: deploy
  script:
    - cd frontend
    - npm ci
    - VITE_API_URL=https://quiz-shield.vercel.app/api npm run build -- --base=/
    - cp dist/index.html dist/404.html
    - mv dist ../public
  artifacts:
    paths:
      - public
  only:
    - main
